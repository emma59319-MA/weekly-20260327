<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王金菊首席經理 | 財經週報</title>
    <style>
        :root { --glass-bg: rgba(255, 255, 255, 0.1); --gold-accent: #D4AF37; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #0f2027, #2c5364); color: white; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 800px; background: var(--glass-bg); backdrop-filter: blur(20px); border-radius: 30px; padding: 40px; border: 1px solid rgba(255,255,255,0.2); }
        .report-section { background: rgba(255,255,255,0.07); border-radius: 20px; padding: 25px; margin-bottom: 20px; font-size: 22pt; line-height: 1.6; border-left: 8px solid var(--gold-accent); }
        .highlight { color: #FFD700; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color:var(--gold-accent); font-size:32pt; text-align:center;">首席經理 財經週報</h1>
        <div class="report-section">1️⃣ <span class="highlight">海峽運量：</span>3月下滑 24.8%，通膨壓力大。</div>
        <div class="report-section">2️⃣ <span class="highlight">油價：</span>飆破 $110，實質購買力受考驗。</div>
        <div class="report-section">3️⃣ <span class="highlight">稅務：</span>遺贈稅新制「受贈人負稅」，需預留稅源。</div>
        <div class="report-section">4️⃣ <span class="highlight">配置：</span>市值型 50%、高股息 30%、利變保單 20%。</div>
        <button style="width:100%; padding:20px; font-size:22pt; background:var(--gold-accent); border:none; border-radius:50px; cursor:pointer;" onclick="alert('已收到諮詢請求')">諮詢金菊首席經理</button>
    </div>
</body>
</html>
